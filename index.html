<!DOCTYPE html>
<html lang="es">

<head>

    <title>Objex - Iniciar Sesión</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="src/icons/lupa.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="css/general.css" rel="stylesheet">
    <link href="css/index.css" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-objex">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Objex</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navObjex"
                    aria-controls="navObjex" aria-expanded="false" aria-label="Mostrar menú">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navObjex">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active disabled" href="#"><i class="fa-solid fa-house"></i> Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#"><i class="fa-solid fa-list"></i> Publicaciones</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#"><i class="fa-solid fa-blog"></i> Postex</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <br>

    <main>

        <section class="contenedor-login">
            <section class="card-login">
                <h2>Inicio de sesión</h2>
                <p>
                    Accede para publicar, contactar usuarios
                    y gestionar tus objetos.
                </p>

                <form method="post" action="pages/publicaciones/publicaciones.html" class="logeo">

                    <label for="correo">Correo institucional</label>

                    <input type="email" id="correo" name="correo" placeholder="ejemplo@espe.edu.ec">

                    <label for="contrasena"> <i class="fa-solid fa-lock"></i> Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder=" Ingrese su contraseña"
                        minlength="8" maxlength="16">
                    <button type="submit" class="boton-bonito">Iniciar sesión</button>

                    <p class="registro-texto">
                        ¿No tienes cuenta?

                        <a href="pages/login/registrarse.html"> Registrarse</a>

                    </p>

                </form>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
